<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inscrição — Semana da Tecnologia</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>Inscrição</h1>
        <p>Preencha o formulário abaixo para garantir sua vaga.</p>
      </header>

      <main>
        <section>
          <h2>Formulário de Inscrição</h2>
          <form id="form-inscricao">
            <label for="nome">Nome completo</label>
            <input
              type="text"
              id="nome"
              name="nome"
              placeholder="Seu nome completo"
              required
            />

            <label for="email">E-mail</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="seu@email.com"
              required
            />

            <button type="submit">Confirmar Inscrição</button>
          </form>
        </section>

        <section class="cta">
          <a href="index.html" class="btn btn-secundario">← Voltar ao evento</a>
        </section>
      </main>

      <footer>
        <p>&copy; 2025 Semana da Tecnologia. Todos os direitos reservados.</p>
      </footer>
    </div>

    <script src="script.js"></script>
  </body>
</html>
